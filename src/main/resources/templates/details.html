<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/" class="text-decoration-none text-dark">Home</a></li>
            <li class="breadcrumb-item active" th:text="${product.name}">Product Name</li>
        </ol>
    </nav>

    <div class="row g-5">
        <div class="col-md-6">
            <img th:src="${product.imageUrl}" class="img-fluid rounded-4 shadow-sm" alt="Product Image">
        </div>

        <div class="col-md-6">
            <h1 class="display-5 fw-bold" th:text="${product.name}">Product Name</h1>
            <h2 class="text-primary my-3">$<span th:text="${product.price}">0.00</span></h2>
            <p class="lead text-muted" th:text="${product.description}">Detailed description...</p>

            <hr class="my-4">

            <form th:action="@{/cart/add}" method="post" class="row g-3">
                <input type="hidden" name="productId" th:value="${product.id}">
                <div class="col-auto">
                    <label class="form-label fw-bold">Quantity</label>
                    <input type="number" name="quantity" class="form-control" value="1" min="1" max="10">
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-dark btn-lg px-5 shadow">
                        <i class="bi bi-cart-plus me-2"></i>Add to Cart
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
