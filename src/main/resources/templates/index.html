<div th:fragment="content">
    <div class="container-fluid p-0 mb-4" style="height: 280px; background: linear-gradient(180deg, #a8e6cf 0%, #eaeded 100%);">
        <div class="container pt-5">
            <div class="col-lg-6">
                <h1 class="display-5 fw-bold text-dark">Smart Shopping Starts Here</h1>
                <p class="lead fw-normal text-muted">Explore our curated collection of electronics, fashion, and home essentials at unbeatable prices.</p>
                <button class="btn btn-dark px-4 py-2">Explore Collections</button>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: -80px;">
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4 mb-5">

            <div class="col" th:each="product : ${products}">
                <div class="card h-100 border-0 shadow-sm rounded-0">
                    <div class="p-3">
                        <h6 class="fw-bold text-dark mb-3" th:text="${product.name}">Product Title</h6>
                        <div class="text-center" style="height: 180px;">
                            <img th:src="${product.imageUrl}" class="img-fluid h-100 w-100" style="object-fit: contain;" alt="Product">
                        </div>
                    </div>
                    <div class="card-body bg-white pt-0">
                        <div class="d-flex align-items-center mb-2">
                            <span class="fs-4 fw-bold text-dark">$</span>
                            <span class="fs-3 fw-bold text-dark" th:text="${#numbers.formatDecimal(product.price, 1, 0)}">0</span>
                            <span class="fs-6 align-self-start mt-1 fw-bold text-dark">99</span>
                        </div>
                        <p class="text-muted small mb-3" th:text="${#strings.abbreviate(product.description, 60)}"></p>
                        <a th:href="@{'/product/' + ${product.id}}" class="btn btn-outline-primary btn-sm w-100">See Details</a>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(products)}" class="col-12 text-center py-5">
                <div class="bg-white p-5 rounded shadow-sm">
                    <i class="bi bi-inbox fs-1 text-secondary"></i>
                    <h4 class="mt-3">No products available right now.</h4>
                    <p class="text-muted">Our team is working on bringing you new arrivals soon!</p>
                </div>
            </div>

        </div>
    </div>
</div>
